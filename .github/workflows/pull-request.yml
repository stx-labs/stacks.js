name: pull-request
on:
  pull_request:
    paths-ignore:
      - "**.md"

  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write # sticky-header on the PR body
  id-token: write # npm OIDC trusted publishing

jobs:
  pre-run:
    uses: ./.github/workflows/pre-run.yml
    secrets: inherit

  commitlint:
    runs-on: ubuntu-latest
    needs: pre-run
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@b948419dd99f3fd78a6548d48f94e3df7f6bf3ed # v6.2.1
        with:
          configFile: .github/.husky/commitlint.json

  tests:
    needs: pre-run
    uses: ./.github/workflows/tests.yml
    secrets: inherit

  publish-pr:
    # Snapshot-publishes every PR push to npm under the `pr` dist-tag, with
    # versions of the form `<next-release>-pr.<PR#>.<N>`. The dist-tag is
    # shared across all PRs; the version string is unique per build so you
    # can pin a specific PR build via `npm i @stacks/foo@7.4.1-pr.1234.0`.
    # Skipped on forks (no secrets / OIDC trust there anyway).
    runs-on: ubuntu-latest
    needs: [pre-run, tests]
    if: needs.pre-run.outputs.is-not-fork == 'true' && github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Seed dummy changeset if none present
        run: |
          if ! ls .changeset/*.md 2>/dev/null | grep -vqi readme; then
            cat > .changeset/__snapshot.md <<'EOF'
          ---
          "@stacks/common": patch
          ---

          snapshot
          EOF
          fi

      - run: npx changeset version
      - id: snapshot
        run: node .github/scripts/snapshot-version.mjs pr --pr ${{ github.event.pull_request.number }}

      # Build CJS+ESM only; UMD has a known module-resolution bug after
      # snapshot-version rewrites internal `@stacks/*` deps to the snapshot
      # version. Tracked separately. Best-effort: a per-package build failure
      # doesn't abort the whole job.
      - name: Build CJS+ESM per workspace (skip UMD)
        run: |
          for pkg in packages/*/; do
            [ -f "$pkg/package.json" ] || continue
            ( cd "$pkg" && npm run build:cjs --if-present && npm run build:esm --if-present ) || echo "build failed for $pkg (continuing)"
          done

      # NPM_CONFIG_IGNORE_SCRIPTS skips each package's prepublishOnly hook
      # (which would re-run the UMD build and fail). Safe for snapshot
      # publishes — proper releases go through the `release` workflow which
      # runs the full build chain.
      - run: npx changeset publish --tag pr --no-git-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_IGNORE_SCRIPTS: 'true'

      - name: Update PR sticky header
        uses: janniks/pull-request-fixed-header@5d331404c3ece209cb49d932fcf0f85c995ce5b5 # v1.1.0
        with:
          header: |
            > This PR was published to npm with the version `${{ steps.snapshot.outputs.version }}` (dist-tag `pr`).
            > e.g. `npm install @stacks/common@${{ steps.snapshot.outputs.version }} --save-exact`
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
