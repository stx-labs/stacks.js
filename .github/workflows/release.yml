name: release

# Release automation via Changesets.
#
# Flow:
#  - Contributors add a changeset file in their PR (`npx changeset`).
#  - On push to main, this workflow either:
#      * Opens/updates a "chore: version packages" PR that consumes pending
#        changesets, bumps versions in lockstep (see fixed-group in
#        .changeset/config.json), and updates CHANGELOGs.
#      * When that release PR is merged, publishes all bumped packages to npm
#        and tags the release.
#
# `commitMode: github-api` makes the action create commits/tags via the GitHub
# REST API authenticated as github-actions[bot], so they get a "Verified" badge
# without us shipping signing keys to CI.

on:
  push:
    branches:
      - main
    tags-ignore:
      - '**'
    paths-ignore:
      - '**.md'

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm OIDC trusted publishing

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  pre-run:
    uses: ./.github/workflows/pre-run.yml
    secrets: inherit

  release:
    runs-on: ubuntu-latest
    needs: pre-run
    if: needs.pre-run.outputs.is-not-fork == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Create release PR or publish
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: npm run version
          publish: npm run release
          title: 'chore: version packages'
          commit: 'chore: version packages'
          commitMode: github-api
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  beta:
    # Snapshot-publishes every push to main to npm under the `beta` dist-tag,
    # with versions of the form `<next-release>-beta.<N>`. Skipped on forks.
    runs-on: ubuntu-latest
    needs: pre-run
    if: needs.pre-run.outputs.is-not-fork == 'true'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Seed dummy changeset if none present
        run: |
          if ! ls .changeset/*.md 2>/dev/null | grep -vqi readme; then
            cat > .changeset/__snapshot.md <<'EOF'
          ---
          "@stacks/common": patch
          ---

          snapshot
          EOF
          fi

      - run: npx changeset version
      - run: node .github/scripts/snapshot-version.mjs beta

      # See pull-request.yml for the same UMD-skipping rationale.
      - name: Build CJS+ESM per workspace (skip UMD)
        run: |
          for pkg in packages/*/; do
            [ -f "$pkg/package.json" ] || continue
            ( cd "$pkg" && npm run build:cjs --if-present && npm run build:esm --if-present ) || echo "build failed for $pkg (continuing)"
          done

      - run: npx changeset publish --tag beta --no-git-tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_IGNORE_SCRIPTS: 'true'
